#======================================================================================================================
# 本地开发环境配置 (local)
# 用于开发人员本地调试，连接本地服务
#======================================================================================================================

# AI 模型配置 - deepSeek
AI_CHAT_BASE_URL=https://dashscope.aliyuncs.com/compatible-mode/v1
AI_CHAT_MODEL_NAME=deepseek-v3

# AI 模型配置 - Ollama (本地)
OLLAMA_BASE_URL=http://localhost:11434
OLLAMA_MODEL_NAME=qwen3:0.6b
OLLAMA_TEMPERATURE=0.8
OLLAMA_TIMEOUT=PT60S

# AI 模型配置 - 阿里百炼平台
DASHSCOPE_CHAT_MODEL_NAME=qwen-max
DASHSCOPE_EMBEDDING_MODEL_NAME=text-embedding-v3
DASHSCOPE_STREAMING_MODEL_NAME=qwen-plus

# 日志配置
langchain4j.open-ai.chat-model.log-requests=true
langchain4j.open-ai.chat-model.log-responses=true
langchain4j.ollama.chat-model.log-requests=true
langchain4j.ollama.chat-model.log-responses=true

# Redis 配置
spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASSWORD:123456}
spring.data.redis.database=1
spring.data.redis.timeout=2s
spring.data.redis.connect-timeout=5s
spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.max-wait=-1ms
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.lettuce.shutdown-timeout=100ms


# MongoDB 配置 - 本地开发环境
spring.data.mongodb.uri=mongodb://localhost:27017/chat_memory_db


# MySQL 配置 - 本地开发环境
spring.datasource.url=jdbc:mysql://localhost:3306/guiguxiaozhi?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:qwer123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis Plus 配置
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
