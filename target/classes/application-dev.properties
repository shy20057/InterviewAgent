#======================================================================================================================
# 开发环境配置 (dev)
# 用于连接开发团队的共享开发服务器
#======================================================================================================================

# AI 模型配置 - deepSeek
AI_CHAT_BASE_URL=https://dashscope.aliyuncs.com/compatible-mode/v1
AI_CHAT_MODEL_NAME=deepseek-v3

# AI 模型配置 - Ollama (开发环境服务器)
OLLAMA_BASE_URL=http://192.168.1.100:11434
OLLAMA_MODEL_NAME=qwen3:0.6b
OLLAMA_TEMPERATURE=0.8
OLLAMA_TIMEOUT=PT60S

# AI 模型配置 - 阿里百炼平台
DASHSCOPE_CHAT_MODEL_NAME=qwen-max
DASHSCOPE_EMBEDDING_MODEL_NAME=text-embedding-v3
DASHSCOPE_STREAMING_MODEL_NAME=qwen-plus

# 日志配置
langchain4j.open-ai.chat-model.log-requests=true
langchain4j.open-ai.chat-model.log-responses=true
langchain4j.ollama.chat-model.log-requests=true
langchain4j.ollama.chat-model.log-responses=true

#======================================================================================================================
# Redis 配置 - 开发环境
#======================================================================================================================
spring.data.redis.host=192.168.1.100
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASSWORD:dev_redis_password}
spring.data.redis.database=0
spring.data.redis.timeout=2s
spring.data.redis.connect-timeout=5s
spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.max-wait=-1ms
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.lettuce.shutdown-timeout=100ms

#======================================================================================================================
# MongoDB 配置 - 开发环境
#======================================================================================================================
spring.data.mongodb.uri=mongodb://192.168.1.100:27017/chat_memory_db

#======================================================================================================================
# MySQL 配置 - 开发环境
#======================================================================================================================
spring.datasource.url=jdbc:mysql://192.168.1.100:3306/guiguxiaozhi?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false
spring.datasource.username=${DB_USERNAME:dev_user}
spring.datasource.password=${DB_PASSWORD:dev_password_123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis Plus 配置
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
